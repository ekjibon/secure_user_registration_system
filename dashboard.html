<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sql.js/dist/sql-wasm.js"></script>
    <script src="script.js"></script>
    <style>
        .container {
            width: 700px;
            max-width: 95vw;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 10px 12px;
            border: 1px solid #ddd;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #007BFF;
            color: white;
        }

        td {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
        }

        .logged-in {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        .logout-btn {
            width: auto;
            padding: 8px 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Dashboard</h2>
        <p class="logged-in" id="loggedInUser"></p>
        <h3>All Registered Users</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password Hash (SHA-512)</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
        <a href="index.html">
            <button class="logout-btn">Logout</button>
        </a>
    </div>

    <script>
        (async function () {
            await initDB();
            const params = new URLSearchParams(window.location.search);
            const username = params.get("username");
            document.getElementById("loggedInUser").innerText = "Logged in as: " + (username || "Unknown");
            const users = loadAllUsers();
            const tbody = document.getElementById("userTableBody");
            if (users.length === 0) {
                tbody.innerHTML = "<tr><td colspan='2' style='text-align:center;font-family:sans-serif'>No users registered yet.</td></tr>";
            } else {
                users.forEach(u => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = "<td style='font-family:sans-serif'>" + u.username + "</td><td>" + u.password_hash + "</td>";
                    tbody.appendChild(tr);
                });
            }
        })();
    </script>

</body>

</html>
