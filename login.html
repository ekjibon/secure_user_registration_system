<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sql.js/dist/sql-wasm.js"></script>
</head>

<body>

    <div class="container">

        <h2>User Login</h2>

        <input type="text" id="loginUsername" placeholder="Enter Username">

        <input type="password" id="loginPassword" placeholder="Enter Password" onkeyup="showStrength('loginPassword', 'loginStrengthText')">

        <p id="loginStrengthText"></p>

        <button onclick="loginUser()">Login</button>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
